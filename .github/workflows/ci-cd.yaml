name: CI/CD Pipeline - Microservicio Java 25

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/mi-microservicio

jobs:

  build-test:
    name: Build y Test con Maven
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compilar con Maven
        run: ./mvnw package -DskipTests -B

      - name: Ejecutar tests
        run: ./mvnw test -B

  build-push:
    name: Build y Push imagen Docker
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Compilar JAR
        run: ./mvnw package -DskipTests -B

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Obtener tag
        id: get-tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.get-tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm:
    name: Actualizar tag en Helm
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Actualizar image tag en values.yaml
        run: |
          NEW_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s|tag: '.*'|tag: '$NEW_TAG'|" helm/mi-servicio/values.yaml
          echo "Tag actualizado a: $NEW_TAG"

      - name: Commit y push del cambio
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add helm/mi-servicio/values.yaml
          git diff --staged --quiet || git commit -m "ci: imagen actualizada a $(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push